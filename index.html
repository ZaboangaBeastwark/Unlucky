<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daggerheart RPG Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="app">
        <!-- Auth View -->
        <main id="view-auth" class="view active glass-panel">
            <div class="auth-container">
                <h1 class="logo-text">Daggerheart</h1>
                <p class="subtitle">Nexus de Aventura</p>

                <div class="tabs">
                    <button class="tab-btn active" data-target="login-form">Login</button>
                    <button class="tab-btn" data-target="register-form">Registrar</button>
                </div>

                <form id="login-form" class="auth-form active">
                    <div class="input-group">
                        <label for="login-username">Usuário</label>
                        <input type="text" id="login-username" required>
                    </div>
                    <div class="input-group">
                        <label for="login-password">Senha</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar no Sistema</button>
                    <div class="error-msg" id="login-error"></div>
                </form>

                <form id="register-form" class="auth-form">
                    <div class="input-group">
                        <label for="reg-username">Usuário</label>
                        <input type="text" id="reg-username" required>
                    </div>
                    <div class="input-group">
                        <label for="reg-password">Senha</label>
                        <input type="password" id="reg-password" required>
                    </div>
                    <div class="input-group">
                        <label for="reg-role">Papel</label>
                        <select id="reg-role">
                            <option value="player">Jogador</option>
                            <option value="gm">Mestre (GM)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Criar Conta</button>
                    <div class="error-msg" id="reg-error"></div>
                </form>
            </div>
        </main>

        <!-- Player View Strategy -->
        <main id="view-player" class="view">
            <header class="app-header glass-panel">
                <div class="header-content">
                    <h2 class="logo-text-small">Daggerheart - Modo Jogador</h2>
                    <div class="user-info">
                        <span id="player-username"></span>
                        <button id="btn-logout-player" class="btn btn-outline">Sair</button>
                    </div>
                </div>
            </header>
            <div class="dashboard-content">
                <!-- Content will be injected here via JS: Char Creation or PC Sheet -->
                <div id="player-dynamic-area"></div>
            </div>
        </main>

        <!-- PLAYER SHOP MODAL -->
        <div id="player-shop-modal" class="modal-overlay"
            style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
            <div class="glass-panel"
                style="width:95%; max-width:900px; height:85vh; padding:2rem; position:relative; display:flex; flex-direction:column;">
                <button onclick="document.getElementById('player-shop-modal').style.display='none'"
                    style="position:absolute; top:1rem; right:1rem; background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>

                <div
                    style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:1rem;">
                    <h2 style="color:var(--accent-gold); font-family: 'Crimson Text', serif; font-size:2rem;"><i
                            class="fas fa-store"></i> Mercado</h2>
                    <div
                        style="font-size:1.2rem; background:rgba(0,0,0,0.5); padding:0.5rem 1rem; border-radius:8px; border:1px solid var(--accent-gold);">
                        Ouro Disponível: <span id="player-shop-gold-display"
                            style="color:var(--accent-gold); font-weight:bold;">0</span></div>
                </div>

                <div style="display:flex; gap:1rem; margin-bottom:1rem;">
                    <input type="text" id="player-shop-search" placeholder="Pesquisar mascate..."
                        onkeyup="filterPlayerShop()"
                        style="flex:1; background:rgba(0,0,0,0.5); border:1px solid var(--glass-border); color:white; padding:0.8rem; border-radius:4px;">
                    <select id="player-shop-category" onchange="filterPlayerShop()"
                        style="flex:1; background:rgba(0,0,0,0.5); border:1px solid var(--glass-border); color:white; padding:0.8rem; border-radius:4px;">
                        <option value="all">Todas as Mercadorias</option>
                        <option value="primary_weapon">Armas Primárias</option>
                        <option value="secondary_weapon">Armas Secundárias</option>
                        <option value="armor">Armaduras</option>
                        <option value="adventure_item">Itens de Aventura</option>
                        <option value="consumable">Consumíveis</option>
                        <option value="professional_kit">Kits Profissionais</option>
                    </select>
                </div>

                <div id="player-shop-items"
                    style="flex:1; overflow-y:auto; padding-right:1rem; display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:1rem; align-content:start;">
                    <!-- Shop items injected here via JS -->
                </div>
            </div>
        </div>

        <!-- GM View Strategy -->
        <main id="view-gm" class="view">
            <header class="app-header glass-panel gm-header">
                <div class="header-content">
                    <h2 class="logo-text-small">Daggerheart - Painel do Mestre</h2>
                    <div class="user-info">
                        <span id="gm-username"></span>
                        <button id="btn-logout-gm" class="btn btn-outline">Sair</button>
                    </div>
                </div>
            </header>
            <div class="dashboard-content">
                <div id="gm-dynamic-area"></div>
            </div>
        </main>
        <!-- GM Equipment Modal -->
        <div id="gm-item-modal" class="modal-overlay"
            style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
            <div class="glass-panel" style="width:90%; max-width:600px; padding:2rem; position:relative;">
                <button onclick="document.getElementById('gm-item-modal').style.display='none'"
                    style="position:absolute; top:1rem; right:1rem; background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
                <h2 id="gm-item-modal-title" style="color:var(--accent-gold); margin-bottom:1.5rem;">Forjar Item</h2>
                <form id="gm-item-form">
                    <input type="hidden" id="gm-item-id">

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
                        <div class="input-group">
                            <label>Nome do Item</label>
                            <input type="text" id="gm-item-name" required>
                        </div>
                        <div class="input-group">
                            <label>Categoria</label>
                            <select id="gm-item-category" required>
                                <option value="primary_weapon">Arma Primária</option>
                                <option value="secondary_weapon">Arma Secundária</option>
                                <option value="armor">Armadura</option>
                                <option value="adventure_item">Item de Aventura</option>
                                <option value="consumable">Consumível</option>
                                <option value="professional_kit">Kit Profissional</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Tier (Nível de Poder)</label>
                            <input type="number" id="gm-item-tier" min="1" max="4" value="1" required>
                        </div>
                        <div class="input-group">
                            <label>Custo Base</label>
                            <input type="text" id="gm-item-cost" value="0">
                        </div>
                    </div>

                    <div class="input-group" style="margin-top:1rem;">
                        <label>Descrição Opcional ou Traços (Visível aos Jogadores)</label>
                        <textarea id="gm-item-desc" rows="3"></textarea>
                    </div>

                    <div class="input-group" style="margin-top:1rem;">
                        <label>Estatísticas Específicas (JSON)</label>
                        <textarea id="gm-item-data" rows="4"
                            placeholder='Ex Armas: {"damage":"d8", "attr":"Força", "slots":1}&#10;Ex Armaduras: {"armor_base":3, "evasion_mod":0}'></textarea>
                    </div>

                    <div style="display:flex; justify-content:space-between; margin-top:2rem;">
                        <div>
                            <button type="button" id="gm-item-delete-btn" class="btn btn-outline"
                                style="border-color:#e74c3c; color:#e74c3c; display:none;"
                                onclick="deleteGmItem()">Excluir Item</button>
                        </div>
                        <div style="display:flex; gap:1rem;">
                            <button type="button" class="btn btn-outline"
                                onclick="document.getElementById('gm-item-modal').style.display='none'">Cancelar</button>
                            <button type="button" class="btn btn-primary" onclick="saveGmItem()">Salvar Item</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Player Item Info Modal -->
        <div id="player-item-info-modal" class="modal-overlay"
            style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1100; align-items:center; justify-content:center;">
            <div class="glass-panel"
                style="width:90%; max-width:500px; padding:2rem; position:relative; animation: fadeIn 0.3s ease;">
                <button onclick="document.getElementById('player-item-info-modal').style.display='none'"
                    style="position:absolute; top:1rem; right:1rem; background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>

                <div id="player-item-info-content">
                    <!-- Content populated by JS -->
                </div>

                <div style="margin-top:2rem; text-align:right;">
                    <button class="btn btn-primary" style="padding: 0.6rem 2rem;"
                        onclick="document.getElementById('player-item-info-modal').style.display='none'">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dh_data.js"></script>
    <script src="js/player.js"></script>
    <script src="js/gm.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
